<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>BRAIN CLASH — Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Orbitron:wght@700;900&family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <div id="bg"></div>
  <div id="app"></div>

  <!--
  ═══════════════════════════════════════════════
  ORDRE DE CHARGEMENT — NE PAS MODIFIER L'ORDRE
  ═══════════════════════════════════════════════

  ÉTAPE 1 — Config globale
  ÉTAPE 2 — Firebase
  ÉTAPE 3 — Questions (index en premier, puis les thèmes)
  ÉTAPE 4 — Rounds (chacun indépendant)
  ÉTAPE 5 — Logique principale
  ÉTAPE 6 — Interface

  ➕ Pour ajouter un thème  → créer js/questions/montheme.js
                              + ajouter une ligne <script> ici
  ➕ Pour ajouter un round  → créer js/rounds/monround.js
                              + ajouter une ligne <script> ici
                              + gérer le cas dans game.js
  -->

  <!-- ÉTAPE 1 : Config globale (THEMES, RT, COL, variables d'état) -->
  <script src="js/config.js"></script>

  <!-- ÉTAPE 2 : Firebase (fg, fs, fp, fd, fl) -->
  <script src="js/firebase.js"></script>

  <!-- ÉTAPE 3 : Questions — index en premier, puis un fichier par thème -->
  <script src="js/questions/index.js"></script>
  <script src="js/questions/culture.js"></script>
  <script src="js/questions/music.js"></script>
  <script src="js/questions/cinema.js"></script>
  <script src="js/questions/sport.js"></script>
  <script src="js/questions/histoire.js"></script>
  <script src="js/questions/science.js"></script>
  <script src="js/questions/geo.js"></script>
  <script src="js/questions/gaming.js"></script>
  <script src="js/questions/hp.js"></script>
  <script src="js/questions/nba.js"></script>
  <script src="js/questions/football.js"></script>
  <script src="js/questions/francaise.js"></script>
  <script src="js/questions/lotr.js"></script>

  <!-- ÉTAPE 5 : Rounds — un fichier par mode de jeu -->
  <script src="js/rounds/qcm.js"></script>
  <script src="js/rounds/buzzer.js"></script>
  <script src="js/rounds/chrono.js"></script>
  <script src="js/rounds/steal.js"></script>
  <script src="js/rounds/patate.js"></script>
  <script src="js/rounds/carton.js"></script>

  <!-- ÉTAPE 5 : Logique principale (orchestre les rounds) -->
  <script src="js/game.js"></script>

  <!-- ÉTAPE 6 : Interface (Home, drawQ, drawScore...) -->
  <script src="js/ui.js"></script>
  <script src="js/ui-inter.js"></script>

</body>
</html>
